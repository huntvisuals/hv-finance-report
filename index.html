    const f=document.createElement('iframe');f.srcdoc=html;document.body.innerHTML='';document.body.appendChild(f);
  }catch(err){document.getElementById('e').textContent='Wrong password.';}
}
document.getElementById('go').onclick=unlock;
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});
